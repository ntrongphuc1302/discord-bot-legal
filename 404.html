<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found — PXZero</title>
  <meta name="description" content="The page you were looking for could not be found." />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%235b64e9'/><text y='.9em' font-size='80' x='50%' text-anchor='middle'>P</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #5b64e9;
      --accent-light: #eeedfd;
      --discord-blurple: #5865F2;
      --discord-blurple-hover: #4752c4;
      --bg-base: #f8f9fa;
      --text-primary: #1a1d21;
      --text-secondary: #4e5058;
      --text-muted: #7c7f8c;
      --border: #e3e5e8;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-text { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }
    .logo-sub { font-weight: 500; font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    .content {
      max-width: 480px;
    }

    .code-404 {
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .content h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .content p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background .15s, transform .15s;
    }

    .btn-primary:hover { background: var(--discord-blurple-hover); transform: translateY(-1px); }
    .btn-primary svg { width: 16px; height: 16px; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: border-color .15s, background .15s;
    }

    .btn-secondary:hover { border-color: var(--accent); background: var(--accent-light); }
    .btn-secondary svg { width: 16px; height: 16px; }

    .site-footer {
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .footer-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-brand { display: flex; align-items: center; gap: 10px; }

    .footer-brand-icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      color: #fff;
    }

    .footer-brand-text { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .footer-copyright { font-size: 12px; color: var(--text-muted); }

    @media (max-width: 600px) {
      .footer-inner { flex-direction: column; align-items: flex-start; }
      .code-404 { font-size: 72px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">P</div>
        <div>

          <div class="logo-sub">Discord Bot</div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-brand-icon">P</div>
        <div class="footer-brand-text">PXZero</div>
      </div>
      <div class="footer-copyright">&copy; 2026 PXZero. All rights reserved.</div>
    </div>
  </footer>

</body>
</html>
